let current = 0;

function renderNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = days.map((d,i) =>
    `<button class="day-btn${i===current?' active':''}" onclick="switchDay(${i})">Day ${d.day}</button>`
  ).join('');
}

function renderCard() {
  const d = days[current];
  const card = document.getElementById('dayCard');
  let slotsHTML = d.slots.map(s => `
    <div class="slot">
      <div class="slot-time">
        <p class="time">${s.time}</p>
        <p class="dur">${s.dur}</p>
      </div>
      <div class="slot-content">
        <div class="slot-label">
          <i class="ti ${s.icon} slot-icon" aria-hidden="true"></i>
          <span class="slot-name">${s.name}</span>
        </div>
        <p class="slot-desc">${s.desc}</p>
        <div class="res-row">
          ${s.resources.map(r => `<a href="${r.url}" class="res-link ${r.type}" target="_blank">${r.label}</a>`).join('')}
        </div>
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="day-header">
      <p class="day-title">Day ${d.day} — ${d.title}</p>
      <p class="day-subtitle">${d.subtitle}</p>
      <div class="tag-row" style="margin-top:7px">
        ${d.tags.map((t,i) => `<span class="tag ${t}">${d.tagLabels[i]}</span>`).join('')}
      </div>
    </div>
    <div class="day-body">${slotsHTML}</div>
    <div class="tip-box">
      <p class="tip-label"><i class="ti ti-bulb" aria-hidden="true" style="margin-right:3px;font-size:12px"></i> Dean's tip</p>
      <p class="tip-text">${d.tip}</p>
    </div>
  `;
}

  current = i;
  renderNav();
  renderCard();
}
